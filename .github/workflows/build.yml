name: Build APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Gradle 8.4
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.4'

      - name: Build debug APK
        run: gradle assembleDebug --no-daemon --stacktrace

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: AOD-Suite-debug-${{ github.sha }}
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 30

      - name: Delete existing pre-release
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          gh release delete v0.1.0-wip --yes || true
          git push origin :refs/tags/v0.1.0-wip || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create WIP Release
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v0.1.0-wip
          name: "v0.1.0-wip — Work In Progress Build"
          body: |
            ## ⚠️ WIP Build — Not for production use

            This is an early development build of **AOD Suite**.

            ### What's in this build
            - ☀️ Minimum AOD brightness control (0–100%)
            - 🌙 Enable / disable Always On Display
            - 🖼 Blurred background wallpaper via Shizuku shell
            - 👆 Tap-to-wake & raise-to-wake toggles
            - 🌡️ Night mode colour temperature control
            - ⏱️ AOD timeout control
            - 🔋 Battery restriction bypass
            - 🖥️ Live shell log output

            ### Requirements
            - Android 10+ (API 29+)
            - [Shizuku](https://shizuku.rikka.app/) installed and running
            - Grant AOD Suite the Shizuku permission on first launch

            ### Install
            Enable "Install from unknown sources" → install the APK → open Shizuku → grant permission to AOD Suite.

            ---
            Built from commit ${{ github.sha }}
          files: app/build/outputs/apk/debug/*.apk
          prerelease: true
          make_latest: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
