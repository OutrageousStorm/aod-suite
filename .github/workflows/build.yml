name: Build APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Gradle 8.4
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.4'

      - name: Build debug APK
        run: gradle assembleDebug --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: AOD-Suite-debug-${{ github.sha }}
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 30

      - name: Publish WIP Release
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          gh release delete v0.1.0-wip --yes 2>/dev/null || true
          git push origin :refs/tags/v0.1.0-wip 2>/dev/null || true
          gh release create v0.1.0-wip \
            app/build/outputs/apk/debug/*.apk \
            --title "v0.1.0-wip — Work In Progress Build" \
            --notes "## WIP Build\n\nBuilt from commit ${{ github.sha }}\n\n**Requirements:** Android 10+, Shizuku running.\n\n**Install:** Unknown sources → install APK → Shizuku → grant permission." \
            --prerelease
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
